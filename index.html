<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BG Collection & Co</title>
  <meta name="description" content="Bolsas e acessórios com estilo — BG Collection & Co" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="splash">
    <div class="splash__content">
      <img src="assets/logo-gold.png" alt="BG Collection & Co" class="splash__logo" />
      <div class="splash__line"></div>
    </div>
    <div class="splash__dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <header class="store-header">
    <div class="store-header__bar container">
      <div class="store-header__brand">
        <h1 id="store-name" class="visually-hidden">BG Collection & Co</h1>
        <img src="assets/logo-black.png" alt="BG Collection & Co" class="store-header__logo" />
      </div>
      <div class="store-header__actions">
        <a id="whatsapp-link" class="social-icon social-icon--whatsapp" href="#" target="_blank" rel="noopener" title="WhatsApp">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        </a>
        <a id="instagram-link" class="social-icon social-icon--instagram" href="#" target="_blank" rel="noopener" title="Instagram">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
        </a>
      </div>
    </div>
  </header>

  <section class="hero" id="hero-section">
    <div class="hero__text">
      <div class="hero__tag">BG Collection &amp; Co.</div>
      <h2>Elegância que<br />você carrega</h2>
      <button class="btn btn-primary" id="hero-cta" style="margin-top:20px;">Ver coleção</button>
    </div>
    <div class="hero__card" id="hero-destaque"></div>
  </section>

  <nav class="category-tabs" id="category-tabs" aria-label="Categorias"></nav>

  <main>
    <div id="products-state" class="state-banner">
      <div class="spinner"></div>
      <p>Carregando produtos...</p>
    </div>
    <div class="product-grid hidden" id="product-grid"></div>
  </main>

  <button class="cart-fab" id="cart-fab" aria-label="Abrir carrinho">
    🛍️
    <span class="cart-fab__badge hidden" id="cart-badge">0</span>
  </button>

  <div class="cart-overlay hidden" id="cart-overlay">
    <div class="cart-drawer">
      <div class="cart-drawer__header">
        <h3 style="margin:0;">Seu carrinho</h3>
        <button class="modal__close" id="cart-close" aria-label="Fechar carrinho">✕</button>
      </div>
      <div class="cart-drawer__items" id="cart-items">
        <p class="state-banner" id="cart-empty">Seu carrinho está vazio.</p>
      </div>
      <div class="cart-drawer__footer" id="cart-footer" style="display:none;">
        <div class="cart-drawer__subtotal">
          <span>Total</span>
          <span id="cart-total">R$ 0,00</span>
        </div>
        <button class="btn btn-primary btn-block" id="checkout-btn">Finalizar pedido no WhatsApp</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay hidden" id="checkout-modal">
    <div class="modal">
      <div class="modal__header">
        <h3 style="margin:0;">Finalizar pedido</h3>
        <button class="modal__close" id="checkout-close" aria-label="Fechar">✕</button>
      </div>
      <form id="checkout-form">
        <div class="modal__body">
          <div class="field">
            <label for="customer-name">Seu nome</label>
            <input type="text" id="customer-name" required autocomplete="name" />
          </div>
          <div class="field">
            <label for="customer-phone">Seu telefone (com DDD)</label>
            <input type="tel" id="customer-phone" required autocomplete="tel" placeholder="(11) 91234-5678" />
          </div>
          <p class="field-hint">Você será redirecionada(o) ao WhatsApp para confirmar o pedido com a loja.</p>
        </div>
        <div class="modal__footer">
          <button type="button" class="btn btn-outline" id="checkout-cancel">Cancelar</button>
          <button type="submit" class="btn btn-primary" id="checkout-submit">Enviar pedido</button>
        </div>
      </form>
    </div>
  </div>

  <footer class="store-footer">
    <p id="footer-text">© <span id="footer-year"></span> BG Collection & Co. Todos os direitos reservados.</p>
  </footer>

  <div class="lightbox-overlay hidden" id="lightbox-overlay">
    <div class="lightbox-top">
      <div>
        <div class="lightbox-cat" id="lightbox-cat"></div>
        <div class="lightbox-name" id="lightbox-name"></div>
      </div>
      <button class="lightbox-close" id="lightbox-close" aria-label="Fechar">✕</button>
    </div>
    <div class="lightbox-main">
      <button class="lightbox-arrow" id="lightbox-prev" aria-label="Foto anterior">‹</button>
      <div id="lightbox-img-wrap"></div>
      <button class="lightbox-arrow" id="lightbox-next" aria-label="Próxima foto">›</button>
    </div>
    <div class="lightbox-bottom">
      <div class="lightbox-thumbs" id="lightbox-thumbs"></div>
      <div class="lightbox-dots" id="lightbox-dots"></div>
      <div class="lightbox-info">
        <div class="lightbox-price" id="lightbox-price"></div>
        <button class="btn btn-primary lightbox-addcart" id="lightbox-addcart">Adicionar ao carrinho</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/store.js"></script>
</body>
</html>
